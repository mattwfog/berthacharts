name: Deploy Gallery

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  TRUNK_VERSION: v0.21.14

jobs:
  build:
    name: build gallery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/leptos-gallery
      - name: Install trunk
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL "https://github.com/trunk-rs/trunk/releases/download/${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xzf- -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build gallery
        working-directory: examples/leptos-gallery
        run: trunk build --release --public-url /berthacharts/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/leptos-gallery/dist

  deploy:
    name: deploy to pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
